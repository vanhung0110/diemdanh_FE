<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Màn Hình QR — Điểm Danh</title>
    <meta name="description" content="Màn hình hiển thị QR Code tại công ty" />
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <style>
        body {
            background: #040408;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            background-image:
                radial-gradient(ellipse 70% 50% at 50% -10%, rgba(255, 80, 0, 0.18) 0%, transparent 65%),
                radial-gradient(ellipse 40% 30% at 90% 90%, rgba(255, 180, 0, 0.06) 0%, transparent 60%);
        }

        .display-container {
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .company-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 2rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* QR wrapper with fire glow */
        .qr-wrapper {
            background: #fff;
            padding: 1.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(255, 80, 0, 0.35), 0 0 120px rgba(255, 80, 0, 0.12), 0 0 2px rgba(255, 80, 0, 0.8);
            margin-bottom: 2rem;
            position: relative;
            animation: qr-pulse 3s ease-in-out infinite;
            transition: opacity 0.3s ease;
        }

        @keyframes qr-pulse {

            0%,
            100% {
                box-shadow: 0 0 60px rgba(255, 80, 0, 0.35), 0 0 120px rgba(255, 80, 0, 0.12), 0 0 2px rgba(255, 80, 0, 0.8)
            }

            50% {
                box-shadow: 0 0 80px rgba(255, 120, 0, 0.5), 0 0 160px rgba(255, 120, 0, 0.18), 0 0 3px rgba(255, 160, 0, 0.9)
            }
        }

        .qr-wrapper img {
            width: 280px;
            height: 280px;
            display: block;
        }

        .qr-wrapper .qr-loading {
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        /* One-time used flash effect */
        .qr-wrapper.used-flash {
            animation: used-flash-anim 0.6s ease-out forwards;
        }

        @keyframes used-flash-anim {
            0% {
                box-shadow: 0 0 60px rgba(255, 80, 0, 0.4);
                opacity: 1;
            }

            30% {
                box-shadow: 0 0 120px rgba(34, 197, 94, 0.9), 0 0 200px rgba(34, 197, 94, 0.4);
                opacity: 0.7;
            }

            60% {
                box-shadow: 0 0 80px rgba(255, 80, 0, 0.6);
                opacity: 0.4;
            }

            100% {
                box-shadow: 0 0 60px rgba(255, 80, 0, 0.35);
                opacity: 1;
            }
        }

        /* "Đang tạo QR mới..." overlay */
        .qr-used-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .qr-used-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .qr-used-overlay .check-icon {
            color: #4ade80;
            font-size: 2.5rem;
            animation: pop-in 0.3s var(--ease-out);
        }

        .qr-used-overlay .gen-text {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        @keyframes pop-in {
            from {
                transform: scale(0.4);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        /* Mode badge */
        .mode-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--fire-orange);
            background: rgba(255, 80, 0, 0.1);
            box-shadow: inset 0 0 0 1px rgba(255, 80, 0, 0.3);
            padding: 0.2rem 0.6rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        /* Timer ring */
        .timer-ring {
            position: relative;
            margin: 0 auto 1.5rem;
            width: 110px;
            height: 110px;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
        }

        .timer-circle-bg {
            stroke: rgba(255, 255, 255, 0.06);
        }

        .timer-circle-fg {
            stroke: var(--fire-orange);
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-number {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--fire-orange);
        }

        .timer-label {
            font-size: 0.58rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            position: absolute;
            bottom: 12px;
            left: 0;
            right: 0;
            text-align: center;
        }

        .helper-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        .sub-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            transition: color 0.3s;
        }

        .sub-text.rotate-soon {
            color: var(--color-warning);
        }

        .status-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--color-success);
            animation: blink 1.5s ease-in-out infinite;
            margin-right: 0.4rem;
            vertical-align: middle;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .step-list {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .step-num {
            width: 28px;
            height: 28px;
            background: rgba(255, 80, 0, 0.15);
            box-shadow: inset 0 0 0 1px rgba(255, 80, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--fire-orange);
        }

        .step-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-align: center;
            max-width: 80px;
        }

        .conn-status {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="display-container">
        <div class="company-name" id="company-name">Hệ Thống Điểm Danh QR</div>

        <div class="mode-badge">
            <svg width="10" height="10" viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2.5">
                <polyline points="20 6 9 17 4 12" />
            </svg>
            One-Time QR Check-in
        </div>

        <div style="position:relative;display:inline-block;margin-bottom:2rem">
            <div class="qr-wrapper" id="qr-box">
                <div class="qr-loading">
                    <div class="fire-orb" style="width:40px;height:40px">
                        <div class="fire-embers">
                            <div class="ember"></div>
                            <div class="ember"></div>
                            <div class="ember"></div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Overlay shown when QR just got used -->
            <div class="qr-used-overlay" id="used-overlay">
                <div class="check-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" stroke="#4ade80" fill="none" stroke-width="2">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="9 12 11 14 15 10" />
                    </svg>
                </div>
                <div class="gen-text">QR vừa được dùng — Đang tạo mới...</div>
            </div>
        </div>

        <div class="timer-ring">
            <svg width="110" height="110" viewBox="0 0 110 110">
                <circle class="timer-circle-bg" cx="55" cy="55" r="48" fill="none" stroke-width="6" />
                <circle class="timer-circle-fg" id="timer-circle" cx="55" cy="55" r="48" fill="none" stroke-width="6"
                    stroke-dasharray="301.6" stroke-dashoffset="0" />
            </svg>
            <div class="timer-number" id="timer-num">--</div>
            <div class="timer-label">giây</div>
        </div>

        <div class="helper-text"><span class="status-dot"></span>QR tự động đổi sau mỗi lần quét</div>
        <div class="sub-text" id="sub-text">Đang tải QR code...</div>

        <div class="step-list">
            <div class="step">
                <div class="step-num">1</div>
                <div class="step-label">Mở app & đăng nhập</div>
            </div>
            <div class="step">
                <div class="step-num">2</div>
                <div class="step-label">Nhấn "Điểm Danh"</div>
            </div>
            <div class="step">
                <div class="step-num">3</div>
                <div class="step-label">Hướng camera vào đây</div>
            </div>
            <div class="step">
                <div class="step-num">4</div>
                <div class="step-label">Chờ xác nhận ✅</div>
            </div>
        </div>

        <div class="conn-status" id="conn-status"><span class="status-dot"></span>Đang kết nối...</div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const CIRCUMFERENCE = 2 * Math.PI * 48; // 301.6
        let rotationSeconds = 30, timerInterval = null;

        async function loadInitialQr() {
            try {
                const data = await Api.get('/qr/current', false);
                rotationSeconds = data.rotationSeconds || 30;
                displayQr(data.qrImageBase64, data.expiresAt);
                startCountdown(new Date(data.expiresAt));
                document.getElementById('conn-status').innerHTML = '<span class="status-dot"></span>Đã kết nối — Live';
            } catch (e) {
                document.getElementById('qr-box').innerHTML = '<div class="qr-loading" style="flex-direction:column;gap:1rem"><svg width="32" height="32" viewBox="0 0 24 24" stroke="#ef4444" fill="none" stroke-width="1.8"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span style="color:#ef4444;font-size:0.8rem">Không thể tải QR. Kiểm tra server.</span></div>';
            }
        }

        function displayQr(base64Img, expiresAt, oneTimeUsed = false) {
            const box = document.getElementById('qr-box');
            box.innerHTML = `<img src="${base64Img}" alt="QR Code điểm danh" style="width:280px;height:280px;display:block"/>`;
            if (expiresAt) {
                const secs = Math.max(0, Math.round((new Date(expiresAt) - Date.now()) / 1000));
                document.getElementById('sub-text').textContent = `Hết hạn lúc ${new Date(expiresAt).toLocaleTimeString('vi-VN')} — tự đổi sau ${rotationSeconds}s nếu chưa dùng`;
                document.getElementById('sub-text').className = secs <= 8 ? 'sub-text rotate-soon' : 'sub-text';
            }
        }

        function startCountdown(expiresAt) {
            if (timerInterval) clearInterval(timerInterval);
            const circle = document.getElementById('timer-circle');
            const numEl = document.getElementById('timer-num');

            timerInterval = setInterval(() => {
                const remaining = Math.max(0, Math.ceil((new Date(expiresAt) - Date.now()) / 1000));
                numEl.textContent = remaining;
                circle.style.strokeDashoffset = CIRCUMFERENCE * (1 - remaining / rotationSeconds);
                if (remaining <= 5) {
                    circle.style.stroke = '#ef4444';
                    numEl.style.color = '#ef4444';
                    document.getElementById('sub-text').className = 'sub-text rotate-soon';
                } else {
                    circle.style.stroke = 'var(--fire-orange)';
                    numEl.style.color = 'var(--fire-orange)';
                }
            }, 1000);
        }

        /** Called when a one-time QR was just consumed — briefly shows green flash overlay */
        function showOneTimeUsedFlash() {
            const overlay = document.getElementById('used-overlay');
            const box = document.getElementById('qr-box');

            // Trigger green flash
            box.classList.add('used-flash');
            overlay.classList.add('show');

            // Hide overlay & remove class after 1.2s (new QR will arrive via SignalR shortly)
            setTimeout(() => {
                overlay.classList.remove('show');
                box.classList.remove('used-flash');
            }, 1200);
        }

        // SignalR — real-time QR broadcasts
        async function connectSignalR() {
            try {
                const conn = new signalR.HubConnectionBuilder()
                    .withUrl('http://localhost:5000/hubs/qr')
                    .withAutomaticReconnect()
                    .build();

                conn.on('ReceiveNewQr', (data) => {
                    // If reason is 'one-time-used', show the green flash before updating
                    if (data.reason === 'one-time-used') {
                        showOneTimeUsedFlash();
                        // Small delay so flash can be seen before QR image swaps
                        setTimeout(() => {
                            rotationSeconds = data.rotationSeconds || 30;
                            displayQr(data.qrImage, data.expiresAt);
                            startCountdown(new Date(data.expiresAt));
                        }, 400);
                    } else {
                        rotationSeconds = data.rotationSeconds || 30;
                        displayQr(data.qrImage, data.expiresAt);
                        startCountdown(new Date(data.expiresAt));
                    }
                });

                conn.onreconnecting(() => {
                    document.getElementById('conn-status').innerHTML = '<span class="status-dot" style="background:var(--color-warning)"></span>Đang kết nối lại...';
                });
                conn.onreconnected(() => {
                    document.getElementById('conn-status').innerHTML = '<span class="status-dot"></span>Đã kết nối lại — Live';
                });

                await conn.start();
                document.getElementById('conn-status').innerHTML = '<span class="status-dot"></span>Kết nối LiveQR thành công!';
            } catch (e) {
                document.getElementById('conn-status').innerHTML = '<span class="status-dot" style="background:var(--color-warning)"></span>Chế độ polling (5s)';
                // Fallback polling
                setInterval(loadInitialQr, 5000);
            }
        }

        // Load company name
        Api.get('/admin/settings', false).then(s => {
            if (s?.companyName) document.getElementById('company-name').textContent = s.companyName;
        }).catch(() => { });

        loadInitialQr().then(connectSignalR);
    </script>
</body>

</html>
