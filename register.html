<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Đăng Ký — Hệ Thống Điểm Danh QR</title>
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>
    <div id="page-loader">
        <div class="fire-orb">
            <div class="fire-embers">
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
            </div>
        </div>
        <div class="fire-loader-text">Đang tải...</div>
    </div>

    <div class="auth-page">
        <div class="auth-card card" style="max-width:520px">
            <div class="auth-logo">
                <svg width="36" height="36" viewBox="0 0 24 24" stroke="var(--fire-orange)" fill="none"
                    stroke-width="1.5" style="margin:0 auto 0.75rem;display:block">
                    <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <line x1="19" y1="8" x2="19" y2="14" />
                    <line x1="22" y1="11" x2="16" y2="11" />
                </svg>
                <h1 style="font-size:1.4rem;font-weight:800;margin-bottom:0.35rem">Đăng Ký Nhân Viên</h1>
                <p style="color:var(--text-muted);font-size:0.82rem">Bạn cần mã đăng ký từ Admin để tiếp tục</p>
            </div>

            <div id="alert-box"></div>

            <form id="register-form">
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Mã Đăng Ký (từ Admin)</label>
                        <input type="text" id="reg-code" class="form-control" placeholder="VD: AB12CD34" required
                            style="text-transform:uppercase" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Mã Nhân Viên</label>
                        <input type="text" id="emp-code" class="form-control" placeholder="NV001" required />
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Họ và Tên</label>
                    <input type="text" id="fullname" class="form-control" placeholder="Nguyễn Văn A" required />
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Mật Khẩu</label>
                        <input type="password" id="password" class="form-control" placeholder="Tối thiểu 6 ký tự"
                            required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Xác Nhận Mật Khẩu</label>
                        <input type="password" id="password2" class="form-control" placeholder="Nhập lại mật khẩu"
                            required />
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Phòng Ban</label>
                        <input type="text" id="department" class="form-control" placeholder="Phòng Kỹ Thuật" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Chức Vụ</label>
                        <input type="text" id="position" class="form-control" placeholder="Nhân Viên" required />
                    </div>
                </div>
                <div class="alert alert-info mt-2">
                    <svg viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                        <line x1="12" y1="12" x2="12" y2="16" />
                    </svg>
                    <span>Tài khoản sẽ được liên kết với thiết bị này. Để đăng nhập trên thiết bị khác, bạn cần liên hệ
                        Admin.</span>
                </div>
                <button type="submit" class="btn btn-primary btn-full mt-2" id="reg-btn" style="padding:0.875rem">
                    <svg viewBox="0 0 24 24">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Hoàn Tất Đăng Ký
                </button>
            </form>

            <div class="text-center mt-2">
                <a href="index.html" class="btn btn-ghost btn-sm">←&nbsp; Đã có tài khoản? Đăng nhập</a>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reg-btn'), alertBox = document.getElementById('alert-box');
            UI.clearAlert(alertBox);
            if (document.getElementById('password').value !== document.getElementById('password2').value) {
                UI.showAlert(alertBox, 'Mật khẩu xác nhận không khớp!', 'error'); return;
            }
            UI.setLoading(btn, true);
            try {
                const empCode = document.getElementById('emp-code').value.trim().toUpperCase();
                const autoEmail = `${empCode.toLowerCase()}@diemdanh.local`;
                const data = await Api.post('/auth/register', {
                    email: autoEmail,
                    password: document.getElementById('password').value,
                    fullName: document.getElementById('fullname').value.trim(),
                    employeeCode: empCode,
                    department: document.getElementById('department').value.trim(),
                    position: document.getElementById('position').value.trim(),
                    registrationCode: document.getElementById('reg-code').value.trim().toUpperCase(),
                    deviceId: DeviceFingerprint.get(),
                    deviceName: DeviceFingerprint.getName()
                }, false);
                Auth.setToken(data.token);
                UI.showAlert(alertBox, 'Đăng ký thành công! Đang chuyển hướng...', 'success');
                setTimeout(() => window.location.href = '/scan.html', 1200);
            } catch (err) { UI.showAlert(alertBox, err.message, 'error'); UI.setLoading(btn, false); }
        });
        setTimeout(() => UI.hideLoader(), 400);
    </script>
</body>

</html>
