<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Quét QR Check-Out</title>
    <link rel="stylesheet" href="css/main.css" />
    <script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
    <style>
        /* ===== CHECKOUT DIALOG ===== */
        .co-modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(4, 4, 8, 0.88);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }

        .co-modal-overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .co-modal {
            background: var(--bg-surface);
            box-shadow: inset 0 0 0 1px var(--border-color), 0 24px 60px rgba(0, 0, 0, 0.6);
            padding: 2rem;
            max-width: 440px;
            width: 100%;
            text-align: center;
            transform: translateY(24px) scale(0.97);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .co-modal-overlay.visible .co-modal {
            transform: translateY(0) scale(1);
        }

        .co-modal-icon {
            margin-bottom: 1rem;
        }

        .co-modal-title {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 0.6rem;
        }

        .co-modal-msg {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }

        /* Countdown ring */
        .co-countdown-ring {
            position: relative;
            width: 72px;
            height: 72px;
            margin: 0 auto 1.25rem;
        }

        .co-countdown-ring svg {
            transform: rotate(-90deg);
        }

        .co-countdown-track {
            stroke: rgba(255, 255, 255, 0.08);
        }

        .co-countdown-fill {
            stroke: #818cf8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .co-countdown-num {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.6rem;
            font-weight: 900;
            color: #818cf8;
        }

        .co-btn-area {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        .co-btn-confirm {
            background: #6366f1;
            color: #fff;
            border: none;
            padding: 0.7rem 1.5rem;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .co-btn-confirm:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        .co-btn-confirm:not(:disabled):hover {
            opacity: 0.88;
            transform: translateY(-1px);
        }

        .co-btn-cancel {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 0.7rem 1.25rem;
            font-size: 0.85rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .co-btn-cancel:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div id="page-loader">
        <div class="fire-orb">
            <div class="fire-embers">
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
            </div>
        </div>
        <div class="fire-loader-text">Đang tải...</div>
    </div>
    <div id="top-loading-bar"></div>

    <header
        style="background:var(--bg-surface);border-bottom:1px solid var(--border-color);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50">
        <div class="flex items-center gap-3">
            <svg width="18" height="18" viewBox="0 0 24 24" stroke="#818cf8" fill="none" stroke-width="1.8">
                <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                <polyline points="16 17 21 12 16 7" />
                <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            <span style="font-weight:700;font-size:0.95rem">Check-Out QR</span>
            <span id="user-name" style="font-size:0.75rem;color:var(--text-muted)"></span>
        </div>
        <div class="flex gap-2">
            <a href="scan.html" class="btn btn-ghost btn-sm">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                    <rect x="14" y="14" width="3" height="3" />
                </svg>
                Check-In
            </a>
            <a href="history.html" class="btn btn-ghost btn-sm">
                <svg viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg>
                Lịch Sử
            </a>
            <button onclick="Auth.logout()" class="btn btn-ghost btn-sm">
                <svg viewBox="0 0 24 24">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Đăng Xuất
            </button>
        </div>
    </header>

    <main style="max-width:640px;margin:0 auto;padding:1.5rem 1rem">

        <!-- Checkout Result -->
        <div id="checkout-result" class="hidden">
            <div id="result-card" class="card text-center" style="padding:2.5rem">
                <div id="result-icon" style="margin-bottom:1rem"></div>
                <h2 id="result-title" style="font-size:1.4rem;font-weight:800;margin-bottom:0.5rem"></h2>
                <p id="result-msg" class="text-muted" style="font-size:0.9rem"></p>
                <button onclick="resetScan()" class="btn btn-ghost mt-3">
                    <svg viewBox="0 0 24 24">
                        <polyline points="23 4 23 10 17 10" />
                        <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" />
                    </svg>
                    Quét Lại
                </button>
            </div>
        </div>

        <!-- Scanner Section -->
        <div id="scanner-section">
            <div class="card mb-2">
                <div class="flex justify-between items-center mb-2">
                    <div class="section-title" style="font-size:0.9rem;margin-bottom:0">Camera Scanner — Check-Out</div>
                    <div id="gps-status" class="badge badge-warning">GPS: Đang xác định...</div>
                </div>
                <div id="reader"
                    style="width:100%;overflow:hidden;box-shadow:inset 0 0 0 1px var(--border-color);min-height:80px">
                </div>
                <div class="flex gap-3 justify-center mt-2" id="scanner-controls">
                    <button id="btn-start" onclick="startScanner()" class="btn btn-primary"
                        style="background:#6366f1;border-color:#6366f1">
                        <svg viewBox="0 0 24 24">
                            <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                            <circle cx="12" cy="13" r="4" />
                        </svg>
                        Bắt Đầu Quét
                    </button>
                    <button id="btn-stop" onclick="stopScanner()" class="btn btn-ghost btn-sm" style="display:none">
                        <svg viewBox="0 0 24 24">
                            <rect x="6" y="4" width="4" height="16" />
                            <rect x="14" y="4" width="4" height="16" />
                        </svg>
                        Dừng
                    </button>
                </div>
                <p class="text-muted text-center mt-2" style="font-size:0.78rem">Hướng camera vào QR Check-Out được hiển
                    thị tại công ty</p>
            </div>

            <div class="card">
                <div class="section-title" style="font-size:0.85rem;margin-bottom:0.75rem">Thông tin kết nối</div>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem">
                    <div><span class="text-muted" style="font-size:0.72rem;text-transform:uppercase">Thiết bị</span>
                        <div style="font-size:0.85rem;margin-top:0.2rem" id="info-device">-</div>
                    </div>
                    <div><span class="text-muted" style="font-size:0.72rem;text-transform:uppercase">GPS</span>
                        <div style="font-size:0.85rem;margin-top:0.2rem" id="info-gps">-</div>
                    </div>
                    <div><span class="text-muted" style="font-size:0.72rem;text-transform:uppercase">Giờ ra về</span>
                        <div style="font-size:0.85rem;margin-top:0.2rem;color:#818cf8;font-weight:700"
                            id="info-work-end">--:--</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="main-alert" class="mt-2"></div>
    </main>

    <!-- ===== CHECKOUT CONFIRMATION MODAL ===== -->
    <div class="co-modal-overlay" id="co-modal">
        <div class="co-modal">
            <div class="co-modal-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke-width="1.8" id="modal-icon-svg">
                    <!-- filled by JS -->
                </svg>
            </div>
            <div class="co-modal-title" id="modal-title"></div>
            <div class="co-modal-msg" id="modal-msg"></div>

            <!-- Countdown ring (only for early checkout) -->
            <div class="co-countdown-ring" id="countdown-ring" style="display:none">
                <svg width="72" height="72" viewBox="0 0 72 72">
                    <circle class="co-countdown-track" cx="36" cy="36" r="30" fill="none" stroke-width="5" />
                    <circle class="co-countdown-fill" id="cd-circle" cx="36" cy="36" r="30" fill="none" stroke-width="5"
                        stroke-dasharray="188.5" stroke-dashoffset="0" />
                </svg>
                <div class="co-countdown-num" id="cd-num">5</div>
            </div>

            <div class="co-btn-area">
                <button class="co-btn-confirm" id="co-btn-confirm" disabled>
                    ✅ Xác Nhận Check-Out
                </button>
                <button class="co-btn-cancel" onclick="closeModal()">Hủy</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        if (!Auth.requireLogin()) { }

        const user = Auth.getUser();
        document.getElementById('user-name').textContent = user?.fullName || user?.email || '';
        document.getElementById('info-device').textContent = DeviceFingerprint.getName();

        let currentLat = null, currentLon = null, isMockLocation = false;
        let scanning = false, html5QrcodeScanner = null;
        let pendingQrToken = null, countdownInterval = null;
        const CD_SECONDS = 5;
        const CD_CIRCUMFERENCE = 188.5;

        // Load work end time
        Api.get('/admin/settings').then(s => {
            if (s?.workEndTime) {
                document.getElementById('info-work-end').textContent = s.workEndTime;
            }
        }).catch(() => { });

        function startGps() {
            if (!navigator.geolocation) {
                document.getElementById('gps-status').textContent = 'GPS: Không hỗ trợ'; return;
            }
            navigator.geolocation.watchPosition(
                pos => {
                    currentLat = pos.coords.latitude; currentLon = pos.coords.longitude; isMockLocation = false;
                    document.getElementById('gps-status').className = 'badge badge-success';
                    document.getElementById('gps-status').textContent = 'GPS: Sẵn sàng';
                    document.getElementById('info-gps').textContent = `${currentLat.toFixed(4)},${currentLon.toFixed(4)}`;
                },
                () => {
                    document.getElementById('gps-status').className = 'badge badge-warning';
                    document.getElementById('gps-status').textContent = 'GPS: Không có';
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
            );
        }

        function startScanner() {
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-stop').style.display = 'flex';
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async (qrToken) => { if (scanning) return; scanning = true; await processCheckOut(qrToken, false); },
                () => { }
            ).catch(() => {
                document.getElementById('btn-start').style.display = 'flex';
                document.getElementById('btn-stop').style.display = 'none';
                UI.showAlert(document.getElementById('main-alert'), 'Không thể mở camera. Vui lòng cấp quyền camera cho trang web này.', 'warning');
            });
        }

        function stopScanner() {
            if (html5QrcodeScanner) { html5QrcodeScanner.stop().catch(() => { }); html5QrcodeScanner = null; }
            document.getElementById('btn-start').style.display = 'flex';
            document.getElementById('btn-stop').style.display = 'none';
            scanning = false;
        }

        async function processCheckOut(qrToken, confirmed) {
            try {
                const data = await Api.post('/attendance/checkout', {
                    qrToken,
                    latitude: currentLat,
                    longitude: currentLon,
                    deviceId: DeviceFingerprint.get(),
                    wifiBssid: '',
                    isMockLocationSuspected: isMockLocation,
                    confirmed
                });

                if (data.isEarly && !confirmed) {
                    // Store token for confirmed re-request
                    pendingQrToken = qrToken;
                    showEarlyDialog(data);
                } else if (data.success) {
                    showResult(true, 'Check-Out Thành Công!', data.message, true);
                } else {
                    showResult(false, 'Check-Out Thất Bại', data.message, false);
                }
            } catch (err) {
                showResult(false, 'Lỗi', err.message, false);
            }
        }

        // ===== DIALOGS =====

        function showEarlyDialog(data) {
            // Format current time in VN timezone
            const nowStr = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const mins = data.minutesRemaining || 0;

            document.getElementById('modal-icon-svg').innerHTML =
                `<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="#f59e0b" fill="none"/>
                 <line x1="12" y1="9" x2="12" y2="13" stroke="#f59e0b"/>
                 <line x1="12" y1="17" x2="12.01" y2="17" stroke="#f59e0b"/>`;
            document.getElementById('modal-icon-svg').setAttribute('stroke', 'none');

            document.getElementById('modal-title').textContent = '⚠️ Check-Out Sớm?';
            document.getElementById('modal-msg').innerHTML =
                `Bây giờ là <strong>${nowStr}</strong>.<br>
                 Bạn còn <strong style="color:#f59e0b">${mins} phút</strong> nữa mới tới giờ ra về.<br>
                 Bạn chắc chắn muốn check-out sớm không?`;

            // Show countdown ring
            document.getElementById('countdown-ring').style.display = 'block';
            const confirmBtn = document.getElementById('co-btn-confirm');
            confirmBtn.disabled = true;

            openModal();
            startCountdown();
        }

        function showOnTimeDialog() {
            document.getElementById('modal-icon-svg').innerHTML =
                `<circle cx="12" cy="12" r="10" stroke="#6366f1" fill="none"/>
                 <polyline points="9 12 11 14 15 10" stroke="#6366f1" fill="none"/>`;
            document.getElementById('modal-icon-svg').setAttribute('stroke', 'none');

            document.getElementById('modal-title').textContent = 'Xác Nhận Check-Out';
            document.getElementById('modal-msg').innerHTML = 'Bạn muốn check-out và kết thúc ngày làm việc?';

            // No countdown for on-time
            document.getElementById('countdown-ring').style.display = 'none';
            const confirmBtn = document.getElementById('co-btn-confirm');
            confirmBtn.disabled = false;

            openModal();
        }

        function startCountdown() {
            let remaining = CD_SECONDS;
            const circle = document.getElementById('cd-circle');
            const numEl = document.getElementById('cd-num');
            numEl.textContent = remaining;

            if (countdownInterval) clearInterval(countdownInterval);
            countdownInterval = setInterval(() => {
                remaining--;
                numEl.textContent = Math.max(remaining, 0);
                circle.style.strokeDashoffset = CD_CIRCUMFERENCE * (1 - remaining / CD_SECONDS);

                if (remaining <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    document.getElementById('co-btn-confirm').disabled = false;
                }
            }, 1000);
        }

        function openModal() {
            document.getElementById('co-modal').classList.add('visible');
        }

        function closeModal() {
            document.getElementById('co-modal').classList.remove('visible');
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            pendingQrToken = null;
            scanning = false;
        }

        async function confirmCheckOut() {
            if (!pendingQrToken) { closeModal(); return; }
            document.getElementById('co-btn-confirm').disabled = true;
            closeModal();
            await processCheckOut(pendingQrToken, true);
        }

        document.getElementById('co-btn-confirm').addEventListener('click', confirmCheckOut);

        // ===== RESULT =====

        function showResult(ok, title, msg, success) {
            document.getElementById('scanner-section').classList.add('hidden');
            document.getElementById('checkout-result').classList.remove('hidden');
            const iconSvg = ok
                ? `<svg width="52" height="52" viewBox="0 0 24 24" stroke="#6366f1" fill="none" stroke-width="2">
                       <circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/>
                   </svg>`
                : `<svg width="52" height="52" viewBox="0 0 24 24" stroke="var(--color-danger)" fill="none" stroke-width="2">
                       <circle cx="12" cy="12" r="10"/>
                       <line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                   </svg>`;
            document.getElementById('result-icon').innerHTML = iconSvg;
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-msg').textContent = msg;
            document.getElementById('result-card').style.boxShadow = `inset 0 0 0 1px ${ok ? 'rgba(99,102,241,0.4)' : 'rgba(239,68,68,0.4)'}`;
            if (html5QrcodeScanner) html5QrcodeScanner.stop().catch(() => { });
        }

        function resetScan() {
            document.getElementById('scanner-section').classList.remove('hidden');
            document.getElementById('checkout-result').classList.add('hidden');
            scanning = false;
            document.getElementById('btn-start').style.display = 'flex';
            document.getElementById('btn-stop').style.display = 'none';
        }

        startGps();
        setTimeout(() => UI.hideLoader(), 400);
    </script>
</body>

</html>
