<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Cài Đặt — Điểm Danh QR</title>
    <link rel="stylesheet" href="../css/main.css" />
</head>

<body>
    <div id="page-loader">
        <div class="fire-orb">
            <div class="fire-embers">
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
            </div>
        </div>
        <div class="fire-loader-text">Đang tải...</div>
    </div>
    <div id="top-loading-bar"></div>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar"></aside>
        <div class="main-content">
            <header class="topbar">
                <span class="topbar-title">Cài Đặt Hệ Thống</span>
                <div class="topbar-actions">
                    <button onclick="saveSettings()" class="btn btn-primary btn-sm" id="save-btn"></button>
                </div>
            </header>
            <div class="page-body" style="max-width:680px">
                <div id="alert-box"></div>

                <div class="card mb-3">
                    <div class="section-title" style="font-size:0.9rem;margin-bottom:1.25rem">Thông Tin Công Ty</div>
                    <div class="form-group"><label class="form-label">Tên Công Ty</label><input type="text" id="s-name"
                            class="form-control" placeholder="Công Ty TNHH ABC" /></div>
                    <div class="grid-2">
                        <div class="form-group"><label class="form-label">Vĩ Độ (Latitude)</label><input type="number"
                                id="s-lat" class="form-control" step="any" placeholder="10.7769" /></div>
                        <div class="form-group"><label class="form-label">Kinh Độ (Longitude)</label><input
                                type="number" id="s-lon" class="form-control" step="any" placeholder="106.7009" /></div>
                    </div>
                    <div class="form-group"><label class="form-label">Bán Kính GPS (mét)</label><input type="number"
                            id="s-radius" class="form-control" placeholder="100" min="10" max="5000" /></div>
                </div>

                <div class="card mb-3">
                    <div class="section-title" style="font-size:0.9rem;margin-bottom:1.25rem">Bảo Mật & Xác Thực</div>
                    <div class="grid-2" style="margin-bottom:1rem">
                        <label
                            style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;padding:0.875rem;background:var(--bg-raised);box-shadow:inset 0 0 0 1px var(--border-color)">
                            <input type="checkbox" id="s-gps" style="accent-color:var(--fire-orange)" />
                            <span>
                                <div style="font-weight:600;font-size:0.85rem">Kiểm Tra GPS</div>
                                <div class="text-muted" style="font-size:0.75rem">Geofencing vị trí văn phòng</div>
                            </span>
                        </label>
                        <label
                            style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;padding:0.875rem;background:var(--bg-raised);box-shadow:inset 0 0 0 1px var(--border-color)">
                            <input type="checkbox" id="s-ip" style="accent-color:var(--fire-orange)" />
                            <span>
                                <div style="font-weight:600;font-size:0.85rem">Kiểm Tra IP</div>
                                <div class="text-muted" style="font-size:0.75rem">Whitelist mạng nội bộ</div>
                            </span>
                        </label>
                        <label
                            style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;padding:0.875rem;background:var(--bg-raised);box-shadow:inset 0 0 0 1px var(--border-color)">
                            <input type="checkbox" id="s-device" style="accent-color:var(--fire-orange)" />
                            <span>
                                <div style="font-weight:600;font-size:0.85rem">Device Fingerprint</div>
                                <div class="text-muted" style="font-size:0.75rem">Ràng buộc tài khoản với thiết bị</div>
                            </span>
                        </label>
                        <label
                            style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;padding:0.875rem;background:var(--bg-raised);box-shadow:inset 0 0 0 1px var(--border-color)">
                            <input type="checkbox" id="s-ai" style="accent-color:var(--fire-orange)" />
                            <span>
                                <div style="font-weight:600;font-size:0.85rem">AI Anomaly Detection</div>
                                <div class="text-muted" style="font-size:0.75rem">Phân tích pattern gian lận</div>
                            </span>
                        </label>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Thời Gian Xoay QR Check-In (giây)</label>
                        <input type="number" id="s-rotation" class="form-control" min="10" max="300" placeholder="30" />
                        <div class="text-muted" style="font-size:0.72rem;margin-top:0.25rem">Khuyến nghị: 15-30 giây.
                            Thấp hơn = bảo mật cao hơn.</div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="section-title" style="font-size:0.9rem;margin-bottom:1.25rem;color:#818cf8">Cài Đặt
                        Check-Out</div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label class="form-label">Giờ Ra Về</label>
                            <input type="time" id="s-work-end" class="form-control" value="17:00" />
                            <div class="text-muted" style="font-size:0.72rem;margin-top:0.25rem">Nhân viên checkout
                                trước giờ này sẽ được xác nhận (checkout sớm).</div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Thời Gian Xoay QR Check-Out (giây)</label>
                            <input type="number" id="s-checkout-rotation" class="form-control" min="10" max="300"
                                placeholder="30" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/admin.js"></script>
    <script>
        injectSidebar('settings');
        document.getElementById('save-btn').innerHTML = Icon.check + ' Lưu Cài Đặt';

        async function loadSettings() {
            try {
                const s = await Api.get('/admin/settings');
                document.getElementById('s-name').value = s.companyName || '';
                document.getElementById('s-lat').value = s.officeLatitude || '';
                document.getElementById('s-lon').value = s.officeLongitude || '';
                document.getElementById('s-radius').value = s.geoFenceRadiusMeters || 100;
                document.getElementById('s-gps').checked = s.enableGpsFencing;
                document.getElementById('s-ip').checked = s.enableIpWhitelist;
                document.getElementById('s-device').checked = s.enableDeviceFingerprint;
                document.getElementById('s-ai').checked = s.enableAiAnomaly;
                document.getElementById('s-rotation').value = s.qrRotationSeconds || 30;
                document.getElementById('s-work-end').value = s.workEndTime || '17:00';
                document.getElementById('s-checkout-rotation').value = s.checkOutQrRotationSeconds || 30;
            } catch (e) { UI.showAlert(document.getElementById('alert-box'), e.message, 'error'); }
        }

        async function saveSettings() {
            const btn = document.getElementById('save-btn'); UI.setLoading(btn, true);
            try {
                await Api.put('/admin/settings', {
                    companyName: document.getElementById('s-name').value,
                    officeLatitude: parseFloat(document.getElementById('s-lat').value) || null,
                    officeLongitude: parseFloat(document.getElementById('s-lon').value) || null,
                    geoFenceRadiusMeters: parseInt(document.getElementById('s-radius').value) || 100,
                    enableGpsFencing: document.getElementById('s-gps').checked,
                    enableIpWhitelist: document.getElementById('s-ip').checked,
                    enableDeviceFingerprint: document.getElementById('s-device').checked,
                    enableWifiCheck: false, allowedWifiBssid: null,
                    qrRotationSeconds: parseInt(document.getElementById('s-rotation').value) || 30,
                    enableAiAnomaly: document.getElementById('s-ai').checked,
                    workEndTime: document.getElementById('s-work-end').value || '17:00',
                    checkOutQrRotationSeconds: parseInt(document.getElementById('s-checkout-rotation').value) || 30
                });
                UI.showAlert(document.getElementById('alert-box'), 'Đã lưu cài đặt! Hệ thống áp dụng ngay.', 'success');
            } catch (e) { UI.showAlert(document.getElementById('alert-box'), e.message, 'error'); }
            UI.setLoading(btn, false);
        }

        loadSettings();
        pageReady();
    </script>
</body>

</html>
