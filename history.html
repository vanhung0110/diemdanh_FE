<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Lịch Sử Điểm Danh — Điểm Danh QR</title>
    <link rel="stylesheet" href="css/main.css" />
</head>

<body>

    <div id="page-loader">
        <div class="fire-orb">
            <div class="fire-embers">
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
                <div class="ember"></div>
            </div>
        </div>
        <div class="fire-loader-text">Đang tải...</div>
    </div>
    <div id="top-loading-bar"></div>

    <header
        style="background:var(--bg-surface);border-bottom:1px solid var(--border-color);padding:0.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50">
        <div style="display:flex;align-items:center;gap:0.75rem">
            <svg width="18" height="18" viewBox="0 0 24 24" stroke="var(--fire-orange)" fill="none" stroke-width="1.8">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                <polyline points="14 2 14 8 20 8" />
                <line x1="16" y1="13" x2="8" y2="13" />
                <line x1="16" y1="17" x2="8" y2="17" />
                <polyline points="10 9 9 9 8 9" />
            </svg>
            <span style="font-weight:700;font-size:0.95rem">Lịch Sử Điểm Danh</span>
        </div>
        <div class="flex gap-2">
            <a href="scan.html" class="btn btn-primary btn-sm">
                <svg viewBox="0 0 24 24">
                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z" />
                    <circle cx="12" cy="13" r="4" />
                </svg>
                Điểm Danh
            </a>
            <button onclick="Auth.logout()" class="btn btn-ghost btn-sm">
                <svg viewBox="0 0 24 24">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Đăng Xuất
            </button>
        </div>
    </header>

    <main style="max-width:900px;margin:0 auto;padding:1.5rem 1rem">
        <div class="flex justify-between items-center mb-3" style="flex-wrap:wrap;gap:0.75rem">
            <div class="section-title" style="margin-bottom:0">Lịch Sử Của Tôi</div>
            <div class="flex gap-2 items-center" style="flex-wrap:wrap">
                <input type="date" id="from-date" class="form-control" style="width:auto" />
                <input type="date" id="to-date" class="form-control" style="width:auto" />
                <button onclick="loadHistory()" class="btn btn-primary btn-sm">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    Lọc
                </button>
            </div>
        </div>

        <div class="grid-4 mb-3">
            <div class="card stat-card">
                <div class="stat-icon"><svg viewBox="0 0 24 24" stroke="var(--fire-orange)" fill="none"
                        stroke-width="1.8">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg></div>
                <div>
                    <div class="stat-number" id="total-count">—</div>
                    <div class="stat-label">Tổng điểm danh</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon"><svg viewBox="0 0 24 24" stroke="var(--fire-orange)" fill="none"
                        stroke-width="1.8">
                        <polyline points="20 6 9 17 4 12" />
                    </svg></div>
                <div>
                    <div class="stat-number" id="valid-count">—</div>
                    <div class="stat-label">Hợp lệ</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon"><svg viewBox="0 0 24 24" stroke="var(--fire-orange)" fill="none"
                        stroke-width="1.8">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg></div>
                <div>
                    <div class="stat-number" id="invalid-count">—</div>
                    <div class="stat-label">Thất bại</div>
                </div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon"><svg viewBox="0 0 24 24" stroke="var(--fire-orange)" fill="none"
                        stroke-width="1.8">
                        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
                        <line x1="12" y1="9" x2="12" y2="13" />
                        <line x1="12" y1="17" x2="12.01" y2="17" />
                    </svg></div>
                <div>
                    <div class="stat-number" id="anomaly-count">—</div>
                    <div class="stat-label">Cảnh báo AI</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Thời Gian Check-In</th>
                            <th>Check-Out</th>
                            <th>Thời Gian LV</th>
                            <th>Trạng Thái</th>
                            <th>IP</th>
                            <th>Vị Trí GPS</th>
                            <th>AI</th>
                        </tr>
                    </thead>
                    <tbody id="history-tbody">
                        <tr>
                            <td colspan="7" class="text-center text-muted" style="padding:3rem">Đang tải...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        if (!Auth.requireLogin()) { }

        async function loadHistory() {
            UI.startTopBar();
            const from = document.getElementById('from-date').value, to = document.getElementById('to-date').value;
            let url = '/attendance/my-history';
            const params = [];
            if (from) params.push(`from=${from}T00:00:00`);
            if (to) params.push(`to=${to}T23:59:59`);
            if (params.length) url += '?' + params.join('&');
            try {
                const data = await Api.get(url);
                document.getElementById('total-count').textContent = data.length;
                document.getElementById('valid-count').textContent = data.filter(d => d.isValid).length;
                document.getElementById('invalid-count').textContent = data.filter(d => !d.isValid).length;
                document.getElementById('anomaly-count').textContent = data.filter(d => d.isAnomalyFlagged).length;
                if (!data.length) { document.getElementById('history-tbody').innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding:3rem">Không có dữ liệu</td></tr>'; UI.endTopBar(); return; }
                document.getElementById('history-tbody').innerHTML = data.map(r => {
                    const coTime = r.checkOutTime ? UI.formatDate(r.checkOutTime) : '-';
                    const coType = r.checkOutType === 'Early' ? '<span class="badge badge-warning">Sớm</span>' :
                        r.checkOutType === 'OnTime' ? '<span class="badge badge-success">Đúng giờ</span>' : '-';
                    let workDur = '-';
                    if (r.checkInTime && r.checkOutTime) {
                        const ms = new Date(r.checkOutTime) - new Date(r.checkInTime);
                        const h = Math.floor(ms / 3600000), m = Math.floor((ms % 3600000) / 60000);
                        workDur = `${h}h ${m}m`;
                    }
                    return `<tr>
          <td>${UI.formatDate(r.checkInTime)}</td>
          <td style="font-size:0.82rem">${coTime} ${coType}</td>
          <td style="font-weight:700;color:${r.checkOutTime ? '#6ee7b7' : 'var(--text-muted)'}">${workDur}</td>
          <td>${r.isValid ? '<span class="badge badge-success">Thành công</span>' : '<span class="badge badge-danger">Thất bại</span>'}${r.invalidReason ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.25rem">${r.invalidReason}</div>` : ''}</td>
          <td><span class="mono">${r.ipAddress || '-'}</span></td>
          <td style="font-size:0.8rem">${r.latitude ? `${r.latitude.toFixed(4)},${r.longitude.toFixed(4)}` : '-'}</td>
          <td>${r.isAnomalyFlagged ? '<span class="badge badge-warning">Đáng ngờ</span>' : '<span class="badge badge-success">Bình thường</span>'}</td>
        </tr>`;
                }).join('');
            } catch (err) {
                document.getElementById('history-tbody').innerHTML = `<tr><td colspan="7" class="text-center"><div class="alert alert-error">${err.message}</div></td></tr>`;
            }
            UI.endTopBar();
        }

        const today = new Date(), weekAgo = new Date(today - 7 * 24 * 60 * 60 * 1000);
        document.getElementById('to-date').value = today.toISOString().split('T')[0];
        document.getElementById('from-date').value = weekAgo.toISOString().split('T')[0];
        loadHistory();

        setTimeout(() => UI.hideLoader(), 400);
    </script>
</body>

</html>
