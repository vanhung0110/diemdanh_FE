<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Đăng Nhập — Hệ Thống Điểm Danh QR</title>
  <meta name="description" content="Đăng nhập vào hệ thống điểm danh QR chống gian lận" />
  <link rel="stylesheet" href="css/main.css" />
</head>

<body>

  <!-- FIRE PAGE LOADER -->
  <div id="page-loader">
    <div class="fire-orb">
      <div class="fire-embers">
        <div class="ember"></div>
        <div class="ember"></div>
        <div class="ember"></div>
        <div class="ember"></div>
        <div class="ember"></div>
        <div class="ember"></div>
      </div>
    </div>
    <div class="fire-loader-text">Đang tải...</div>
  </div>

  <div class="auth-page">
    <div class="auth-card card">
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="3" height="3" />
            <rect x="19" y="19" width="2" height="2" />
          </svg>
        </div>
        <h1>Điểm Danh QR</h1>
        <p>Hệ thống điểm danh chống gian lận đa tầng</p>
      </div>

      <div id="alert-box"></div>

      <!-- LOGIN FORM -->
      <div id="login-section">
        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="email">Email / Mã NV / Mã SV</label>
            <input type="text" id="email" class="form-control" placeholder="NV00001 hoặc email@congty.com" required
              autocomplete="username" />
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Mật khẩu</label>
            <input type="password" id="password" class="form-control" placeholder="••••••••" required
              autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn"
            style="padding:0.875rem;margin-top:0.5rem">
            <svg viewBox="0 0 24 24">
              <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4" />
              <polyline points="10 17 15 12 10 7" />
              <line x1="15" y1="12" x2="3" y2="12" />
            </svg>
            Đăng Nhập
          </button>
        </form>
        <div class="auth-divider">hoặc</div>
        <div class="text-center">
          <p class="text-muted" style="font-size:0.82rem;margin-bottom:0.5rem">Chưa có tài khoản? Liên hệ admin để nhận
            mã đăng ký.</p>
          <a href="register.html" class="btn btn-ghost btn-full">
            <svg viewBox="0 0 24 24">
              <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <line x1="19" y1="8" x2="19" y2="14" />
              <line x1="22" y1="11" x2="16" y2="11" />
            </svg>
            Đăng Ký Nhân Viên
          </a>
        </div>
      </div>

      <!-- DEVICE BLOCKED SECTION -->
      <div id="device-blocked-section" style="display:none">
        <div class="alert alert-warning" style="margin-bottom:1.25rem">
          <svg viewBox="0 0 24 24">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12.01" y2="18" />
          </svg>
          <span><strong>Phát hiện thiết bị mới!</strong><br /><span style="font-size:0.82rem">Tài khoản đã đăng nhập từ
              thiết bị khác. Nhập mã xác nhận 1 lần từ Admin để đăng nhập.</span></span>
        </div>
        <div class="form-group">
          <label class="form-label">Mã xác nhận từ Admin</label>
          <input type="text" id="device-code" class="form-control" placeholder="Ví dụ: AB12CD"
            style="text-transform:uppercase;letter-spacing:0.2rem;font-size:1.1rem;font-weight:700;text-align:center"
            maxlength="8" oninput="this.value=this.value.toUpperCase()" />
        </div>
        <div id="device-alert"></div>
        <button onclick="submitDeviceChange()" class="btn btn-primary btn-full" id="device-btn"
          style="padding:0.875rem">
          <svg viewBox="0 0 24 24">
            <polyline points="23 4 23 10 17 10" />
            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" />
          </svg>
          Xác Nhận Đổi Thiết Bị
        </button>
        <button onclick="backToLogin()" class="btn btn-ghost btn-full mt-2">← Quay lại đăng nhập</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      const user = Auth.getUser();
      window.location.href = user?.role === 'Admin' ? '/admin/dashboard.html' : '/scan.html';
    }

    let pendingEmail = '';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('login-btn'), alertBox = document.getElementById('alert-box');
      UI.clearAlert(alertBox); UI.setLoading(btn, true);
      try {
        const data = await Api.post('/auth/login', {
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
          deviceId: DeviceFingerprint.get(),
          deviceName: DeviceFingerprint.getName()
        }, false);
        Auth.setToken(data.token);
        UI.showAlert(alertBox, data.message || 'Đăng nhập thành công!', 'success');
        setTimeout(() => { window.location.href = data.role === 'Admin' ? '/admin/dashboard.html' : '/scan.html'; }, 800);
      } catch (err) {
        if (err.errorCode === 'DEVICE_BLOCKED') {
          pendingEmail = document.getElementById('email').value.trim();
          showDeviceBlockedSection(err.message);
        } else { UI.showAlert(alertBox, err.message, 'error'); }
        UI.setLoading(btn, false);
      }
    });

    function showDeviceBlockedSection(msg) {
      document.getElementById('login-section').style.display = 'none';
      document.getElementById('device-blocked-section').style.display = 'block';
      UI.clearAlert(document.getElementById('alert-box'));
    }

    function backToLogin() {
      document.getElementById('login-section').style.display = 'block';
      document.getElementById('device-blocked-section').style.display = 'none';
      document.getElementById('device-code').value = '';
      UI.clearAlert(document.getElementById('device-alert'));
    }

    async function submitDeviceChange() {
      const btn = document.getElementById('device-btn'), code = document.getElementById('device-code').value.trim(), alertBox = document.getElementById('device-alert');
      if (!code) { UI.showAlert(alertBox, 'Vui lòng nhập mã xác nhận từ Admin.', 'error'); return; }
      UI.setLoading(btn, true); UI.clearAlert(alertBox);
      try {
        const data = await Api.post('/auth/change-device', {
          email: pendingEmail, registrationCode: code,
          newDeviceId: DeviceFingerprint.get(), newDeviceName: DeviceFingerprint.getName()
        }, false);
        Auth.setToken(data.token);
        UI.showAlert(alertBox, 'Thiết bị đã được xác nhận! Đang chuyển hướng...', 'success');
        setTimeout(() => { window.location.href = data.role === 'Admin' ? '/admin/dashboard.html' : '/scan.html'; }, 1000);
      } catch (err) { UI.showAlert(alertBox, err.message, 'error'); UI.setLoading(btn, false); }
    }

    setTimeout(() => UI.hideLoader(), 400);
  </script>
</body>

</html>
